all:
  hosts:
    homeserver:
      ansible_host: localhost
      ansible_connection: local
      homelab_nfs_enabled: true
      homelab_longhorn_data_dir: /mnt/ssd0/longhorn
      homelab_required_mounts:
        - /mnt/ssd0
      k3s_node_labels:
        - homelab.storage/ssd=true
        - node.longhorn.io/create-default-disk=true

    worker:
      ansible_host: 192.168.1.xxx  # TODO: set M720q LAN IP
      ansible_user: ubuntu
      homelab_nfs_enabled: false
      homelab_longhorn_data_dir: /var/lib/longhorn  # TODO: adjust if using a dedicated disk
      homelab_required_mounts: []
      k3s_server_url: https://192.168.1.110:6443
      k3s_node_labels:
        - homelab.storage/ssd=true
        - node.longhorn.io/create-default-disk=true

  vars:
    timezone: Asia/Ho_Chi_Minh

    k3s_version: v1.33.12+k3s1
    k3s_config_dir: /etc/rancher/k3s
    k3s_config_file: /etc/rancher/k3s/config.yaml
    k3s_data_dir: /var/lib/rancher/k3s
    k3s_kubeconfig_file: /etc/rancher/k3s/k3s.yaml

    homelab_hdd_mount: /mnt/ssd0
    homelab_ssd_mount: /mnt/ssd
    homelab_k8s_hdd_volume_root: /mnt/ssd0/k8s-volumes
    homelab_nfs_allowed_clients:
      - 192.168.1.110/32
    homelab_nfs_exports:
      - path: /mnt/ssd0
        options: rw,sync,no_subtree_check,crossmnt,no_root_squash

    tailscale_ip: 100.96.51.117

    k3s_disable_components:
      - traefik
