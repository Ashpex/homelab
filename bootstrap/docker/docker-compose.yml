services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "784:784/udp"
      - "853:853/tcp"
      - "853:853/udp"
      - "3000:3000/tcp"
      - "5443:5443/tcp"
      - "5443:5443/udp"
      - "8853:8853/udp"
      - "8081:80/tcp"
    volumes:
      - /mnt/ssd0/infra-data/adguard/config:/opt/adguardhome/conf
      - /mnt/ssd0/infra-data/adguard/work:/opt/adguardhome/work
      - /etc/localtime:/etc/localtime:ro
