---
- name: Configure ZFS pool and datasets
  hosts: homeserver
  gather_facts: yes
  become: yes

  # Example defaults: override with -e as needed
  vars:
    zfs_confirm: false
    zfs_pool_name: tank
    zfs_vdev_type: mirror
    zfs_devices: []            # e.g. ['/dev/sdb','/dev/sdc']
    zfs_datasets: []

  tasks:
    - name: Include ZFS role
      include_role:
        name: zfs


