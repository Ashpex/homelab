---
# Display service URLs after deployment
# Dynamically generated from services dict — no manual updates needed when adding services
- name: Display service URLs
  debug:
    msg: |
      {% if single_service is defined %}Service '{{ single_service }}' deployed successfully!{% else %}Services deployed successfully!{% endif %}

      Access your services at:
      {% for name, cfg in services | dictsort %}
      {% if cfg.enabled | default(false) %}
      {% if name == 'traefik' %}
      - {{ name }}: http://{{ ansible_host }}:{{ cfg.dashboard_port }}{% if cfg.dashboard_domain is defined %} ({{ cfg.dashboard_domain }}){% endif %}

      {% elif name == 'arr' %}
      - sonarr: http://{{ ansible_host }}:{{ cfg.sonarr_port }}
      - radarr: http://{{ ansible_host }}:{{ cfg.radarr_port }}
      - prowlarr: http://{{ ansible_host }}:{{ cfg.prowlarr_port }}
      {% elif cfg.port is defined %}
      - {{ name }}: http://{{ ansible_host }}:{{ cfg.port }}{% if cfg.domain is defined %} ({{ cfg.domain }}){% endif %}

      {% elif cfg.web_port is defined %}
      - {{ name }}: http://{{ ansible_host }}:{{ cfg.web_port }}{% if cfg.domain is defined %} ({{ cfg.domain }}){% endif %}

      {% endif %}
      {% endif %}
      {% endfor %}
