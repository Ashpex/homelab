nfs:
  server: 192.168.1.110

app-template:
  fullnameOverride: calibre-web
  controllers:
    main:
      containers:
        main:
          image:
            repository: crocodilestick/calibre-web-automated
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: http
            containerPort: 8083
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 8083
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: library.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            identifier: main
            port: http
  persistence:
    config:
      enabled: true
      type: hostPath
      hostPath: "/mnt/hdd1/infra-data/calibre-web"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/config"
    books:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: calibre-web-books
      advancedMounts:
        main:
          main:
          - path: "/calibre-library"
    ingest:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: calibre-web-ingest
      advancedMounts:
        main:
          main:
          - path: "/cwa-book-ingest"
