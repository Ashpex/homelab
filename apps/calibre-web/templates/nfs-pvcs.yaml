{{- $server := required "nfs.server is required" .Values.nfs.server -}}
{{- $volumes := list
  (dict "name" "books" "path" "/mnt/ssd0/media/library/books" "size" "1Gi")
  (dict "name" "ingest" "path" "/mnt/ssd0/media/library/books-ingest" "size" "1Gi")
-}}
{{- range $volume := $volumes }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: calibre-web-{{ $volume.name }}-nfs
spec:
  capacity:
    storage: {{ $volume.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
    - timeo=30
    - retrans=3
  nfs:
    server: {{ $server | quote }}
    path: {{ $volume.path | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-web-{{ $volume.name }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ $volume.size }}
  volumeName: calibre-web-{{ $volume.name }}-nfs
  storageClassName: ""
{{- end }}
