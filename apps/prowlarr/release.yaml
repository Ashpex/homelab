apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
  namespace: flux-system
spec:
  suspend: false
  targetNamespace: prowlarr
  interval: 30m
  dependsOn:
    - name: traefik
      namespace: flux-system
    - name: longhorn
      namespace: flux-system
  chart:
    spec:
      chart: ./apps/prowlarr
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 12h
      reconcileStrategy: Revision
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    force: true
