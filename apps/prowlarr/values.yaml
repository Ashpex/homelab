longhorn:
  storageClassName: longhorn
  configSize: 100Mi

app-template:
  fullnameOverride: prowlarr
  controllers:
    main:
      containers:
        main:
          image:
            repository: lscr.io/linuxserver/prowlarr
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: PUID
            value: '1000'
          - name: PGID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: web
            containerPort: 9696
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        web:
          enabled: true
          primary: true
          port: 9696
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: prowlarr.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            identifier: main
            port: web
  persistence:
    main-config:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: prowlarr-config
      advancedMounts:
        main:
          main:
          - path: "/config"
    main-logs:
      enabled: true
      type: emptyDir
      advancedMounts:
        main:
          main:
          - path: "/config/logs"
