apiVersion: batch/v1
kind: Job
metadata:
  name: navidrome-download-lyrics-plugin
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: curlimages/curl:8.8.0
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/plugins
              curl -fsSL https://github.com/J0R6IT0/navidrome-lyrics-plugin/releases/latest/download/nd-lyrics.ndp -o /data/plugins/nd-lyrics.ndp.tmp
              mv /data/plugins/nd-lyrics.ndp.tmp /data/plugins/nd-lyrics.ndp
              chmod 755 /data/plugins
              chmod 644 /data/plugins/nd-lyrics.ndp
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /mnt/hdd1/infra-data/navidrome
            type: DirectoryOrCreate
