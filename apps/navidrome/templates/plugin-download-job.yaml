{{- if .Values.pluginDownload.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: navidrome-download-lyrics-plugin
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download
          image: curlimages/curl:8.21.0
          command:
            - sh
            - -ec
            - |
              mkdir -p /data/plugins
              tmpdir="$(mktemp -d)"
              curl -fL --retry 3 --retry-delay 5 https://github.com/J0R6IT0/navidrome-lyrics-plugin/releases/latest/download/nd-lyrics.ndp -o "${tmpdir}/nd-lyrics.ndp"
              curl -fL --retry 3 --retry-delay 5 https://github.com/navidrome/discord-rich-presence-plugin/releases/latest/download/discord-rich-presence.ndp -o "${tmpdir}/discord-rich-presence.ndp"
              cp -f "${tmpdir}/nd-lyrics.ndp" /data/plugins/nd-lyrics.ndp
              cp -f "${tmpdir}/discord-rich-presence.ndp" /data/plugins/discord-rich-presence.ndp
              chmod 755 /data/plugins
              chmod 644 /data/plugins/*.ndp
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /mnt/hdd1/infra-data/navidrome
            type: DirectoryOrCreate
{{- end }}
