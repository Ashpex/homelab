              - symbol: BTC-USD
                name: Bitcoin
              - symbol: NVDA
                name: NVIDIA
              - symbol: AAPL
                name: Apple
              - symbol: MSFT
                name: Microsoft
              - symbol: GOOGL
                name: Google
              - symbol: AMD
                name: AMD
          - type: dns-stats
            service: adguard
            url: http://server.ashpex.net:8081/
            username: ashpex
            password: rioken
