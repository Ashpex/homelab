{{- $server := required "nfs.server is required" .Values.nfs.server -}}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: copyparty-share-nfs
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: {{ $server | quote }}
    path: /mnt/ssd0
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-share
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  volumeName: copyparty-share-nfs
  storageClassName: ""
