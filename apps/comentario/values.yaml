app-template:
  fullnameOverride: comentario
  controllers:
    main:
      containers:
        main:
          image:
            repository: registry.gitlab.com/comentario/comentario
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          args:
          - -c
          - /config/config.yaml
          - --secrets
          - /config/secrets.yaml
          env:
          - name: BASE_URL
            value: https://comments.ashpex.net
          ports:
          - name: http
            containerPort: 80
  configMaps:
    config:
      enabled: true
      data:
        config.yaml: |
          idps:
            oidc:
              - id: authelia
                name: Authelia
                url: https://auth.ashpex.net
                scopes:
                  - openid
                  - email
                  - profile
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 80
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: comments.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            name: main
            port: http
  persistence:
    config-file:
      enabled: true
      type: configMap
      name: comentario-config
      advancedMounts:
        main:
          main:
          - path: "/config/config.yaml"
            subPath: config.yaml
            readOnly: true
    secrets:
      enabled: true
      type: secret
      name: comentario-secrets
      advancedMounts:
        main:
          main:
          - path: "/config/secrets.yaml"
            subPath: secrets.yaml
            readOnly: true
    data:
      enabled: true
      type: hostPath
      hostPath: "/mnt/hdd1/infra-data/comentario"
      hostPathType: DirectoryOrCreate
      advancedMounts:
        main:
          main:
          - path: "/data"
