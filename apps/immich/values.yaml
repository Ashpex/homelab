nfs:
  server: 192.168.1.110

longhorn:
  storageClassName: longhorn
  postgresSize: 5Gi

app-template:
  fullnameOverride: immich
  controllers:
    server:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/immich-server
            tag: v3.0.3
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: DB_HOSTNAME
            value: immich-postgres
          - name: DB_USERNAME
            value: immich
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-db
                key: POSTGRES_PASSWORD
          - name: DB_DATABASE_NAME
            value: immich
          - name: UPLOAD_LOCATION
            value: "/usr/src/app/upload"
          - name: REDIS_HOSTNAME
            value: immich-redis
          - name: IMMICH_CONFIG_FILE
            value: "/config/immich.yaml"
          ports:
          - name: http
            containerPort: 2283
    machine-learning:
      enabled: false
    redis:
      containers:
        main:
          image:
            repository: docker.io/redis
            tag: 8.8-alpine
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          ports:
          - name: redis
            containerPort: 6379
    postgres:
      containers:
        main:
          image:
            repository: ghcr.io/immich-app/postgres
            tag: 14-vectorchord0.4.3-pgvectors0.2.0
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: true
              custom: true
              spec:
                tcpSocket:
                  port: postgres
                initialDelaySeconds: 30
                periodSeconds: 30
            startup:
              enabled: false
          env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: immich-db
                key: POSTGRES_PASSWORD
          - name: POSTGRES_USER
            value: immich
          - name: POSTGRES_DB
            value: immich
          - name: POSTGRES_INITDB_ARGS
            value: "--data-checksums"
          ports:
          - name: postgres
            containerPort: 5432
  service:
    server:
      enabled: true
      controller: server
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 2283
          protocol: HTTP
    redis:
      enabled: true
      controller: redis
      type: ClusterIP
      ports:
        redis:
          enabled: true
          primary: true
          port: 6379
          protocol: TCP
    postgres:
      enabled: true
      controller: postgres
      type: ClusterIP
      ports:
        postgres:
          enabled: true
          primary: true
          port: 5432
          protocol: TCP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: photos.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            identifier: server
            port: http
  persistence:
    server-upload:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: immich-library
      advancedMounts:
        server:
          main:
          - path: "/usr/src/app/upload"
    server-localtime:
      enabled: true
      type: hostPath
      hostPath: "/etc/localtime"
      hostPathType: File
      advancedMounts:
        server:
          main:
          - path: "/etc/localtime"
            readOnly: true
    server-config:
      enabled: true
      type: secret
      name: immich-config
      advancedMounts:
        server:
          main:
          - path: "/config/immich.yaml"
            subPath: immich.yaml
            readOnly: true
    postgres-data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: immich-postgres
      advancedMounts:
        postgres:
          main:
          - path: "/var/lib/postgresql/data"
            subPath: postgres
