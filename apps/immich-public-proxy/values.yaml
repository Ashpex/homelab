app-template:
  fullnameOverride: immich-public-proxy
  controllers:
    main:
      containers:
        main:
          image:
            repository: alangrainger/immich-public-proxy
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: TZ
            value: Asia/Ho_Chi_Minh
          - name: IMMICH_URL
            value: http://immich-server.immich.svc.cluster.local:2283
          - name: PUBLIC_BASE_URL
            value: https://gallery.ashpex.net
          ports:
          - name: http
            containerPort: 3000
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: gallery.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            identifier: main
            port: http
