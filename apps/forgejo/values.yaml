app-template:
  fullnameOverride: forgejo
  controllers:
    main:
      initContainers:
        init-config:
          image:
            repository: busybox
            tag: latest
          command:
          - sh
          - -c
          - |
            mkdir -p /data/gitea/conf
            cp /config-template/app.ini /data/gitea/conf/app.ini
            chown 1000:1000 /data/gitea/conf/app.ini
      containers:
        main:
          image:
            repository: codeberg.org/forgejo/forgejo
            tag: '13'
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: USER_UID
            value: '1000'
          - name: USER_GID
            value: '1000'
          - name: TZ
            value: Asia/Ho_Chi_Minh
          ports:
          - name: http
            containerPort: 3000
  configMaps:
    config:
      enabled: true
      data:
        app.ini: |
          APP_NAME = Ashpex's Git Server
          RUN_MODE = prod

          [server]
          DOMAIN = git.ashpex.net
          HTTP_PORT = 3000
          ROOT_URL = https://git.ashpex.net/
          DISABLE_SSH = true
          LANDING_PAGE = /ashpex
          APP_DATA_PATH = /data/gitea

          [database]
          DB_TYPE = sqlite3
          PATH = /data/gitea/forgejo.db

          [security]
          INSTALL_LOCK = true

          [service]
          DISABLE_REGISTRATION = true
          ENABLE_BASIC_AUTHENTICATION = false

          [openid]
          ENABLE_OPENID_SIGNIN = false
          ENABLE_OPENID_SIGNUP = false

          [oauth2_client]
          ENABLE_AUTO_REGISTRATION = true
          ACCOUNT_LINKING = auto
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: git.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            name: main
            port: http
  persistence:
    main-data:
      enabled: true
      type: hostPath
      hostPath: "/mnt/hdd1/infra-data/forgejo"
      hostPathType: Directory
      advancedMounts:
        main:
          init-config:
          - path: "/data"
          main:
          - path: "/data"
    config-template:
      enabled: true
      type: configMap
      name: forgejo-config
      advancedMounts:
        main:
          init-config:
          - path: "/config-template"
            readOnly: true
    main-localtime:
      enabled: true
      type: hostPath
      hostPath: "/etc/localtime"
      hostPathType: File
      advancedMounts:
        main:
          main:
          - path: "/etc/localtime"
            readOnly: true
