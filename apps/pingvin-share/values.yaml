nfs:
  server: 192.168.1.110

app-template:
  fullnameOverride: pingvin-share
  controllers:
    main:
      containers:
        main:
          image:
            repository: stonith404/pingvin-share
            tag: latest
          probes:
            liveness:
              enabled: false
            readiness:
              enabled: false
            startup:
              enabled: false
          env:
          - name: TZ
            value: Asia/Ho_Chi_Minh
          - name: TRUST_PROXY
            value: "true"
          ports:
          - name: http
            containerPort: 3000
  service:
    main:
      enabled: true
      controller: main
      type: ClusterIP
      ports:
        http:
          enabled: true
          primary: true
          port: 3000
          protocol: HTTP
  ingress:
    main:
      enabled: true
      className: traefik
      annotations: {}
      hosts:
      - host: share.ashpex.net
        paths:
        - path: "/"
          pathType: Prefix
          service:
            identifier: main
            port: http
  persistence:
    main-data:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: pingvin-share-data
      advancedMounts:
        main:
          main:
          - path: "/opt/app/data"
    main-config:
      enabled: true
      type: secret
      name: pingvin-share-config
      advancedMounts:
        main:
          main:
          - path: "/opt/app/config.yaml"
            subPath: config.yaml
            readOnly: true
