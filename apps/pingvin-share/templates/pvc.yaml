apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pingvin-share-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.longhorn.dataSize }}
  storageClassName: {{ .Values.longhorn.storageClassName | quote }}
