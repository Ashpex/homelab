{{- $server := required "nfs.server is required" .Values.nfs.server -}}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pingvin-share-data-nfs
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: {{ $server | quote }}
    path: /mnt/ssd0/pingvin-share
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pingvin-share-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
  volumeName: pingvin-share-data-nfs
  storageClassName: ""
