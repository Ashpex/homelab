{{- $server := required "nfs.server is required" .Values.nfs.server -}}
{{- $volumes := list
  (dict "name" "movies" "path" "/mnt/ssd0/media/movies" "size" "1Gi")
  (dict "name" "downloads" "path" "/mnt/ssd0/downloads" "size" "1Gi")
-}}
{{- range $volume := $volumes }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-{{ $volume.name }}-nfs
spec:
  capacity:
    storage: {{ $volume.size }}
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: {{ $server | quote }}
    path: {{ $volume.path | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr-{{ $volume.name }}
  namespace: {{ $.Release.Namespace }}
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ $volume.size }}
  volumeName: radarr-{{ $volume.name }}-nfs
  storageClassName: ""
{{- end }}
