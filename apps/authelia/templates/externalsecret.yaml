apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: authelia-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        identity_validation.reset_password.jwt.hmac.key: "{{ "{{ .AUTHELIA_JWT_SECRET }}" }}"
        session.encryption.key: "{{ "{{ .AUTHELIA_SESSION_SECRET }}" }}"
        storage.encryption.key: "{{ "{{ .AUTHELIA_STORAGE_KEY }}" }}"
        identity_providers.oidc.hmac.key: "{{ "{{ .AUTHELIA_SESSION_SECRET }}" }}"
  data:
    - secretKey: AUTHELIA_JWT_SECRET
      remoteRef:
        key: authelia.secrets
        property: AUTHELIA_JWT_SECRET
    - secretKey: AUTHELIA_SESSION_SECRET
      remoteRef:
        key: authelia.secrets
        property: AUTHELIA_SESSION_SECRET
    - secretKey: AUTHELIA_STORAGE_KEY
      remoteRef:
        key: authelia.secrets
        property: AUTHELIA_STORAGE_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-jwks
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    name: authelia-jwks
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      data:
        key.pem: "{{ "{{ .AUTHELIA_OIDC_JWKS_KEY | b64dec }}" }}"
  data:
    - secretKey: AUTHELIA_OIDC_JWKS_KEY
      remoteRef:
        key: authelia.secrets
        property: AUTHELIA_OIDC_JWKS_KEY
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oidc-clients
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: oidc.clients
