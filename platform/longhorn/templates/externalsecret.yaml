apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backblaze-bucket-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: global-secrets
  target:
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: backblaze.bucket
