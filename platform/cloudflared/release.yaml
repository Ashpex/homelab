apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  suspend: false
  targetNamespace: cloudflared
  interval: 30m
  chart:
    spec:
      chart: ./platform/cloudflared
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 12h
      reconcileStrategy: Revision
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
    force: true
