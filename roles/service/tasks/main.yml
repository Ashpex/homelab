
# Generic service role
# Expects:
# - service_key: name of the service (e.g., "forgejo")
# - service_cfg: dict of that service's config (from services.<name>)
# - service_action: one of [up, down, pull, recreate] (default: up)
# - compose_cmd: set by the docker role (e.g., "docker compose" or "docker-compose")

- name: Define build paths
  set_fact:
    resolved_build_root: "{{ (build_root if (build_root is defined and build_root | length > 0) else (playbook_dir + '/../build')) }}"

- name: Set service build directory
  set_fact:
    service_build_dir: "{{ resolved_build_root }}/services/{{ service_key }}"

- name: Ensure build roots exist
  file:
    path: "{{ build_dir }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ resolved_build_root }}"
    - "{{ resolved_build_root }}/services"
    - "{{ service_build_dir }}"
  loop_control:
    loop_var: build_dir

- name: Collect service-specific directories
  set_fact:
    service_dir_candidates: |
      {{ [
          service_cfg.config_path | default(None),
          service_cfg.data_path | default(None),
          service_cfg.cache_path | default(None),
          service_cfg.metadata_path | default(None),
          service_cfg.assets_path | default(None),
          service_cfg.upload_path | default(None),
          service_cfg.library_path | default(None)
        ] | reject('equalto', None) | list }}

- name: Ensure service-specific directories exist
  file:
    path: "{{ svc_dir }}"
    state: directory
    mode: '0755'
    owner: "{{ user_id }}"
    group: "{{ group_id }}"
  loop: "{{ service_dir_candidates }}"
  loop_control:
    loop_var: svc_dir
  become: yes

- name: Render docker-compose.yml if template exists
  vars:
    compose_template_src: "{{ playbook_dir }}/../templates/services/{{ service_key }}.yml.j2"
  block:
    - name: Check template
      stat:
        path: "{{ compose_template_src }}"
      register: compose_template

    - name: Render compose
      when: compose_template.stat.exists and service_action != 'down'
      template:
        src: "{{ compose_template_src }}"
        dest: "{{ service_build_dir }}/docker-compose.yml"
        mode: '0644'

# Config file processing (handles all services including Traefik)
- block:
    - name: Check if config directory exists for {{ service_key }}
      stat:
        path: "{{ playbook_dir }}/../configs/{{ service_key }}"
      register: config_dir

    - name: Find .j2 template files for {{ service_key }}
      find:
        paths: "{{ playbook_dir }}/../configs/{{ service_key }}"
        patterns: "*.j2"
        file_type: file
        recurse: yes
      register: j2_files
      when: config_dir.stat.exists

    - name: Find regular config files for {{ service_key }}
      find:
        paths: "{{ playbook_dir }}/../configs/{{ service_key }}"
        patterns: "*"
        excludes: "*.j2,*.example,.gitkeep"
        file_type: file
        recurse: yes
      register: regular_files
      when: config_dir.stat.exists

    - name: Collect config subdirectories
      set_fact:
        config_subdirs: >-
          {{ ((j2_files.files | default([])) + (regular_files.files | default([])))
             | map(attribute='path')
             | map('regex_replace', '^.*/configs/' + service_key + '/', '')
             | map('dirname')
             | select('ne', '.')
             | unique
             | list }}
      when: config_dir.stat.exists

    - name: Ensure config subdirectories exist
      file:
        path: "{{ service_cfg.config_path }}/{{ subdir }}"
        state: directory
        mode: '0755'
      loop: "{{ config_subdirs | default([]) }}"
      loop_control:
        loop_var: subdir
      when: config_subdirs | default([]) | length > 0

    - name: Render .j2 template files for {{ service_key }}
      template:
        src: "{{ config_file.path }}"
        dest: "{{ service_cfg.config_path }}/{{ config_file.path | regex_replace('^.*/configs/' + service_key + '/', '') | regex_replace('\\.j2$', '') }}"
        mode: '0644'
      loop: "{{ j2_files.files | default([]) }}"
      loop_control:
        loop_var: config_file
      when: j2_files.files | default([]) | length > 0

    - name: Copy regular config files for {{ service_key }}
      copy:
        src: "{{ config_file.path }}"
        dest: "{{ service_cfg.config_path }}/{{ config_file.path | regex_replace('^.*/configs/' + service_key + '/', '') }}"
        mode: '0644'
      loop: "{{ regular_files.files | default([]) }}"
      loop_control:
        loop_var: config_file
      when: regular_files.files | default([]) | length > 0
  when: service_cfg.config_path is defined and service_action != 'down'

# Traefik-specific: ensure acme.json exists with correct permissions
- name: Ensure Traefik acme.json exists
  file:
    path: "{{ services.traefik.data_path }}/acme.json"
    state: touch
    mode: '0600'
    owner: "{{ user_id }}"
    group: "{{ group_id }}"
  become: yes
  when: service_key == 'traefik' and service_action != 'down'

- name: Pull images
  command: "{{ compose_cmd }} pull"
  args:
    chdir: "{{ service_build_dir }}"
  register: pull_result
  failed_when: false
  changed_when: pull_result.rc == 0
  when: force_pull | default(false) or service_action in ['pull', 'recreate']

- name: Warn if image pull failed
  debug:
    msg: "WARNING: Image pull failed for {{ service_key }}: {{ pull_result.stderr | default('unknown error') }}"
  when:
    - pull_result is defined
    - pull_result.rc is defined
    - pull_result.rc != 0

- name: Compose down
  command: "{{ compose_cmd }} down"
  args:
    chdir: "{{ service_build_dir }}"
  when: service_action == 'down'

- name: Compose up
  command: "{{ compose_cmd }} up -d"
  args:
    chdir: "{{ service_build_dir }}"
  when: service_action == 'up'

- name: Compose up (force recreate)
  command: "{{ compose_cmd }} up -d --force-recreate"
  args:
    chdir: "{{ service_build_dir }}"
  when: service_action == 'recreate'
